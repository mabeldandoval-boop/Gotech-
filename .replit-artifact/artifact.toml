kind = "web"
previewPath = "/"
title = "GoTechSV"
version = "1.0.0"
id = "artifacts/gotechsv"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19750

[services.development]
run = "pnpm --filter @workspace/gotechsv run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/gotechsv", "run", "build" ]
publicDir = "artifacts/gotechsv/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19750"
BASE_PATH = "/"
